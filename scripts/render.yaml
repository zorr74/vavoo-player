services:
  - type: web
    name: vavoo-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn scripts.server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    autoDeploy: true
